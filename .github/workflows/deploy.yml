name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  cancel-in-progress: false
  group: pier-demo-production

jobs:
  deploy:
    name: Test and deploy
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      PIER_API_KEY: ${{ secrets.PIER_API_KEY }}
      PIER_REGISTRY_TOKEN: ${{ secrets.PIER_REGISTRY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Checkout Pier CLI source
        uses: actions/checkout@v4
        with:
          repository: withharbor/hosting
          path: .pier-cli-source
          ref: main
          token: ${{ secrets.PIER_PLATFORM_CHECKOUT_TOKEN }}

      - name: Install Pier CLI
        working-directory: .pier-cli-source
        run: |
          bun install --frozen-lockfile
          mkdir -p "$HOME/.bun/bin"
          ln -sf "$PWD/packages/cli/src/index.ts" "$HOME/.bun/bin/pier"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Pier env types
        run: pier env types

      - name: Run checks
        run: bun run check

      - name: Deploy
        run: pier run --env prod -- bun run deploy
