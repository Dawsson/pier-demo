name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  cancel-in-progress: false
  group: pier-demo-production

jobs:
  deploy:
    name: Test and deploy
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      PIER_API_KEY: ${{ secrets.PIER_API_KEY }}
      PIER_ORGANIZATION_ID: ${{ vars.PIER_ORGANIZATION_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install Pier CLI
        run: BUN_INSTALL_CACHE_DIR="$RUNNER_TEMP/bun-pier-cli-cache" bun add -g @buildwithharbor/pier@0.1.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Pier env types
        run: pier env types

      - name: Run checks
        run: bun run check

      - name: Deploy
        run: pier deploy all --env prod
