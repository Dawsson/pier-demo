name: Check

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  cancel-in-progress: true
  group: check-${{ github.workflow }}-${{ github.ref }}

jobs:
  check:
    name: Lint, typecheck, and test
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      PIER_API_KEY: ${{ secrets.PIER_API_KEY }}
      PIER_API_URL: https://api.buildwithharbor.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Checkout Pier CLI source
        uses: actions/checkout@v4
        with:
          repository: withharbor/hosting
          path: .pier-cli-source
          ref: main
          token: ${{ secrets.PIER_PLATFORM_CHECKOUT_TOKEN }}

      - name: Install Pier CLI
        working-directory: .pier-cli-source
        run: |
          bun install --frozen-lockfile
          mkdir -p "$HOME/.bun/bin"
          ln -sf "$PWD/packages/cli/src/index.ts" "$HOME/.bun/bin/pier"

      - name: Store Pier API key
        run: printf '%s' "$PIER_API_KEY" | pier config api-key set --value-stdin

      - name: Install dependencies
        run: pier package install

      - name: Generate Pier env types
        run: pier env types --api "$PIER_API_URL"

      - name: Run checks
        run: bun run check
