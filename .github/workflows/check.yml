name: Check

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  cancel-in-progress: true
  group: check-${{ github.workflow }}-${{ github.ref }}

jobs:
  check:
    name: Lint, typecheck, and test
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      PIER_API_KEY: ${{ secrets.PIER_API_KEY }}
      PIER_API_URL: https://api.buildwithharbor.com
      PIER_ORGANIZATION_ID: org_pier_platform
      PIER_REGISTRY_TOKEN: ${{ secrets.PIER_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Checkout Pier CLI source
        env:
          PIER_PLATFORM_CHECKOUT_TOKEN: ${{ secrets.PIER_PLATFORM_CHECKOUT_TOKEN }}
        run: |
          git clone --depth 1 --branch main "https://x-access-token:${PIER_PLATFORM_CHECKOUT_TOKEN}@github.com/withharbor/hosting.git" "$RUNNER_TEMP/pier-cli-source"

      - name: Install Pier CLI
        working-directory: ${{ runner.temp }}/pier-cli-source
        run: |
          bun install --frozen-lockfile
          mkdir -p "$HOME/.bun/bin"
          ln -sf "$PWD/packages/cli/src/index.ts" "$HOME/.bun/bin/pier"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Pier env types
        run: pier env types --api "$PIER_API_URL"

      - name: Run checks
        run: bun run check
