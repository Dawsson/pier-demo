name: Check

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  cancel-in-progress: true
  group: check-${{ github.workflow }}-${{ github.ref }}

jobs:
  check:
    name: Lint, typecheck, and test
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      PIER_API_KEY: ${{ secrets.PIER_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install Pier CLI
        run: BUN_INSTALL_CACHE_DIR="$RUNNER_TEMP/bun-pier-cli-cache" bun add -g @buildwithharbor/pier@0.1.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Pier env types
        run: pier env types

      - name: Run checks
        run: bun run check
